<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circle Lab - Games</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Exo:wght@300;400;500;600;700&family=Roboto+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared/theme.css">
  <link rel="stylesheet" href="shared/navbar.css">
</head>
<body>
  <div id="navbar-container"></div>
  <main style="padding-top: 100px; min-height: 80vh; display:flex; align-items:center; justify-content:center; flex-direction:column; text-align:center;">
    <div style="width:120px; height:120px; border-radius:50%; border:2px solid var(--color-primary); box-shadow: var(--glow-primary); display:flex; align-items:center; justify-content:center; margin-bottom:24px;">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--color-primary)" stroke-width="2">
        <rect x="6" y="10" width="12" height="8" rx="1"/>
        <path d="M9 10V8a3 3 0 0 1 6 0v2"/>
        <circle cx="12" cy="14" r="1"/>
      </svg>
    </div>
    <h1 style="font-family:'Exo',sans-serif; color:var(--text-primary); font-size:2rem; margin-bottom:8px;" data-i18n="title">Circle Geometry Games</h1>
    <p style="color:var(--text-muted); font-family:'Roboto Mono',monospace; font-size:0.9rem;" data-i18n="subtitle">Learn through play</p>
    <p style="color:var(--text-muted); margin-top:24px; font-family:'Roboto Mono',monospace; font-size:0.85rem; padding:12px 24px; border:1px dashed var(--border-color); border-radius:8px;" data-i18n="coming">Game content coming soon — this section is under development by a teammate.</p>
  </main>

  <script src="shared/theme.js"></script>
  <script src="shared/navbar.js"></script>
  <script src="shared/i18n.js"></script>
  <script src="shared/accessibility.js"></script>
  <script src="shared/privacy.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (window.CircleLab && window.CircleLab.theme) {
        window.CircleLab.theme.init();
      }
      if (window.CircleLab && window.CircleLab.navbar) {
        window.CircleLab.navbar.init({ activePage: 'game' });
      }
      if (window.CircleLab && window.CircleLab.i18n) {
        window.CircleLab.i18n.init('game');
      }
      if (window.CircleLab && window.CircleLab.accessibility) {
        window.CircleLab.accessibility.init();
      }
      if (window.CircleLab && window.CircleLab.privacy) {
        window.CircleLab.privacy.init();
      }
    });
  </script>
</body>
</html>
