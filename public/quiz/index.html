<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Circle Lab - Quiz</title>
  <link rel="stylesheet" href="../shared/theme.css" />
  <link rel="stylesheet" href="../shared/navbar.css" />
  <link rel="stylesheet" href="quiz.css" />
</head>
<body class="quiz-page">
  <div id="navbar-container"></div>

  <section class="quiz-hero">
    <h1>Circle Geometry Quiz</h1>
    <p>Test your knowledge of circle theorems.</p>
  </section>

  <main class="quiz-shell">
    <div class="quiz-topbar">
      <div class="quiz-chip">Progress: <strong id="quiz-progress">0/0</strong></div>
      <div class="quiz-chip">Level: <strong id="quiz-level">1</strong></div>
      <div class="quiz-chip">Count: <strong id="quiz-question-counter">0/0</strong></div>
    </div>

    <div class="quiz-question-card">
      <h2 id="quiz-question-text">Loading question...</h2>
      <div class="quiz-image-wrap">
        <img id="quiz-image" src="" alt="Geometry Diagram">
      </div>
      <div id="quiz-options" class="quiz-options"></div>
    </div>

    <div id="quiz-feedback" class="quiz-feedback"></div>
    
    <div class="quiz-actions">
      <button id="quiz-next" class="quiz-btn quiz-btn--primary quiz-btn--hidden">Next Question</button>
      <button id="quiz-restart" class="quiz-btn quiz-btn--hidden">Restart Quiz</button>
    </div>
  </main>

  <script src="../shared/theme.js"></script>
  <script src="../shared/navbar.js"></script>
  <script src="../shared/i18n.js"></script>
  <script src="quiz.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // 初始化组长的全局模块
      window.CircleLab.theme.init();
      window.CircleLab.navbar.init({ activePage: 'quiz' });
      window.CircleLab.i18n.init('quiz');
      window.CircleLabQuiz.init(); 
    });
  </script>
</body>
</html>
