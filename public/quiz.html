<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circle Lab - Quiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Exo:wght@300;400;500;600;700&family=Roboto+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared/theme.css">
  <link rel="stylesheet" href="shared/navbar.css">
  <link rel="stylesheet" href="quiz/quiz.css">
</head>
<body>
  <main class="quiz-page">
    <section class="quiz-hero">
      <h1 data-i18n="title">Circle Geometry Quiz</h1>
      <p data-i18n="subtitle">Test your understanding with theorem-based questions.</p>
    </section>

    <section class="quiz-shell" aria-live="polite">
      <header class="quiz-topbar">
        <p class="quiz-chip"><span data-i18n="progressLabel">Progress</span>: <strong id="quiz-progress">1 / 4</strong></p>
        <p class="quiz-chip"><span data-i18n="levelLabel">Level</span>: <strong id="quiz-level">1</strong></p>
        <p class="quiz-chip"><span data-i18n="questionLabel">Question</span>: <strong id="quiz-question-counter">1 / 4</strong></p>
      </header>

      <article class="quiz-question-card">
        <h2 id="quiz-question-text" data-i18n="loading">Loading question...</h2>

        <div class="quiz-image-wrap">
          <img id="quiz-image" src="" alt="Circle theorem diagram">
        </div>

        <div id="quiz-options" class="quiz-options" role="group" aria-label="Quiz options"></div>
      </article>

      <p id="quiz-feedback" class="quiz-feedback" aria-live="assertive"></p>

      <div class="quiz-actions">
        <button id="quiz-next" class="quiz-btn quiz-btn--primary quiz-btn--hidden" type="button" data-i18n="next">Next Question</button>
        <button id="quiz-restart" class="quiz-btn quiz-btn--hidden" type="button" data-i18n="restart">Restart Quiz</button>
      </div>
    </section>
  </main>

  <script src="shared/theme.js"></script>
  <script src="shared/navbar.js"></script>
  <script src="shared/i18n.js"></script>
  <script src="shared/accessibility.js"></script>
  <script src="shared/privacy.js"></script>
  <script src="quiz/quiz.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      if (window.CircleLab && window.CircleLab.navbar) {
        window.CircleLab.navbar.initNavbar({ activePage: 'quiz' });
      }
      if (window.CircleLab && window.CircleLab.i18n) {
        window.CircleLab.i18n.setLanguage(window.CircleLab.i18n.getLanguage());
      }
      if (window.CircleLab && window.CircleLab.accessibility) {
        window.CircleLab.accessibility.initAccessibility();
      }
      if (window.CircleLab && window.CircleLab.privacy) {
        window.CircleLab.privacy.initPrivacy();
      }
      if (window.CircleLabQuiz) {
        window.CircleLabQuiz.init();
      }
    });
  </script>
</body>
</html>
